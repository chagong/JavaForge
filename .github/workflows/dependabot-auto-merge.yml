name: Dependabot Auto-Merge (Copilot CLI)

# Runs on a daily schedule and uses the GitHub Copilot CLI to audit and safely
# merge low-risk Dependabot pull requests across all Microsoft-managed Java
# tooling repositories in this workspace.
#
# Requirements (two repository secrets):
#   - `GH_PAT`: a Personal Access Token (classic or fine-grained) with
#     `repo` + `pull_request` write access to every target microsoft/* repo.
#     Used by the gh CLI and any GitHub API access (the default `GITHUB_TOKEN`
#     cannot reach other repositories, so a PAT is mandatory). Wired into
#     GH_TOKEN and GITHUB_TOKEN.
#   - `COPILOT_CLI_TOKEN`: a token with a GitHub Copilot entitlement, used by
#     the Copilot CLI itself. Wired into COPILOT_GITHUB_TOKEN. May be the same
#     PAT as GH_PAT if that account also has a Copilot entitlement.
#   - `PERSONAL_NOTIFICATION_URL`: Azure Logic App HTTP trigger URL used by the
#     send-teams-notification skill to deliver the run summary to Teams.
#   - `RECIPIENTS`: comma/semicolon-separated list of recipient email addresses
#     for the Teams notification.

on:
  schedule:
    # 06:00 Asia/Shanghai (UTC+8) every day = 22:00 UTC the previous day.
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Audit and report only; do not approve or merge."
        type: boolean
        default: false

# Prevent overlapping runs from racing on the same PRs.
concurrency:
  group: dependabot-auto-merge
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  manage-dependabot:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # GH_PAT drives the gh CLI and GitHub API/MCP access (cross-repo write).
      # COPILOT_CLI_TOKEN provides the Copilot CLI entitlement.
      GH_TOKEN: ${{ secrets.GH_PAT }}
      GITHUB_TOKEN: ${{ secrets.GH_PAT }}
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}
      # Teams notification (send-teams-notification skill).
      PERSONAL_NOTIFICATION_URL: ${{ secrets.PERSONAL_NOTIFICATION_URL }}
      RECIPIENTS: ${{ secrets.RECIPIENTS }}
      WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      DRY_RUN: ${{ inputs.dry_run == true && 'true' || 'false' }}
    steps:
      - name: Checkout (for the Dependabot agent and skills)
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install GitHub Copilot CLI
        run: npm install -g @github/copilot

      - name: Verify gh authentication
        run: gh auth status

      - name: Manage Dependabot PRs
        run: |
          PROMPT="Manage open Dependabot pull requests across the Microsoft-managed Java tooling repositories.

          The 'workflowRunUrl' for the Teams notification is ${WORKFLOW_RUN_URL}."
          if [ "$DRY_RUN" = "true" ]; then
            PROMPT="$PROMPT

          DRY RUN MODE IS ENABLED: Do NOT approve, merge, comment on, or modify any pull request. Only audit and print the report."
          fi
          mkdir -p copilot-logs
          copilot \
            --allow-all \
            --enable-all-github-mcp-tools \
            --no-ask-user \
            --agent "Dependabot PR Manager" \
            --log-level debug \
            --log-dir ./copilot-logs \
            --share ./copilot-session.md \
            --prompt "$PROMPT"

      - name: Upload Copilot logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: copilot-logs
          path: |
            ./copilot-logs
            ./copilot-session.md
          if-no-files-found: ignore
          retention-days: 14
